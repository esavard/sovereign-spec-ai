# factory_config.yaml
project_name: "SovereignSpecAI"
stages:
  - "01_backlog"
  - "02_ready_for_dev"
  - "03_ready_for_review"
  - "04_dev_done"
  - "05_done"

default_model: "ollama/qwen2.5-coder:14b-instruct-q6_K"

# Commands run in PROJECT_ROOT after aider succeeds, before moving to review.
# If a command exits non-zero, a rework ticket is auto-generated with the error output.
pre_review_checks: []

# Optional per-role model overrides.  Roles not listed fall back to default_model.
model_overrides:
  architect: "ollama/devstral-small-2:24b-instruct-2512-q4_K_M"
  developer: "ollama/qwen2.5-coder:32b-instruct-q3_K_M"
  reviewer:  "ollama/codestral:22b-v0.1-q4_K_M"
