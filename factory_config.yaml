# factory_config.yaml
project_name: "SovereignSpecAI"
stages:
  - "01_backlog"
  - "02_ready_for_dev"
  - "03_ready_for_review"
  - "04_dev_done"
  - "05_done"

default_model: "ollama/qwen2.5-coder:14b-instruct-q6_K"

# Commands run in PROJECT_ROOT after aider succeeds, before moving to review.
# If a command exits non-zero, a rework ticket is auto-generated with the error output.
pre_review_checks: []

# Optional per-role model overrides.  Roles not listed fall back to default_model.
#
# Any role accepts either a local Ollama model ("ollama/<name>", VRAM-managed
# automatically) or a remote Anthropic model ("anthropic/<name>", requires
# ANTHROPIC_API_KEY in the environment). Point a role at Claude to validate or
# benchmark a local model's output on the same spec, e.g.:
#   reviewer: "anthropic/claude-sonnet-4-6"
model_overrides:
  architect: "anthropic/claude-sonnet-4-6"
  developer: "anthropic/claude-sonnet-4-6"
  reviewer:  "anthropic/claude-sonnet-4-6"
